<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, interactive-widget=resizes-content" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#000000" />
  <title>rickin // terminal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="scanlines"></div>
  <div id="app">
    <header id="header">
      <div class="header-inner">
        <span class="logo">[RICKIN]</span>
        <span class="status-dot" id="status-dot" title="Connected"></span>
        <span class="model-badge" id="model-badge">claude-sonnet-4-6</span>
        <div class="header-actions">
          <a href="/api/logout" class="logout-btn">[EXIT]</a>
          <button class="icon-btn" id="new-session-btn" title="New session">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M12 5v14M5 12h14"/>
            </svg>
          </button>
        </div>
      </div>
    </header>

    <main id="messages" role="log" aria-live="polite" aria-label="Terminal">
      <div class="scroll-anchor" id="scroll-anchor"></div>
    </main>

    <div id="status-bar" class="hidden">
      <span id="status-text">[PROCESSING...]</span>
      <div class="spinner"></div>
    </div>

    <div id="interview-notice" class="hidden">
      <a id="interview-link" href="/interview" target="_blank">
        [INTERVIEW FORM READY — TAP TO OPEN]
      </a>
    </div>

    <footer id="input-area">
      <div class="input-row">
        <span class="prompt-prefix">$</span>
        <textarea
          id="input"
          placeholder="enter command..."
          rows="1"
          enterkeyhint="send"
          autocomplete="off"
          autocorrect="off"
          spellcheck="false"
          aria-label="Command"
        ></textarea>
        <button id="send-btn" aria-label="Send">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M5 12h14M12 5l7 7-7 7"/>
          </svg>
        </button>
      </div>
    </footer>
  </div>

  <script src="app.js"></script>
</body>
</html>
