<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, interactive-widget=resizes-content" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#000000" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/icons/icon-180.png" />
  <title>rickin // terminal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <script>if(localStorage.getItem("theme")==="light"){document.documentElement.style.background="#f7f5f2"}</script>
</head>
<body>
  <div class="scanlines"></div>
  <div id="app">
    <header id="header">
      <div class="header-inner">
        <span class="logo">[RICKIN]</span>
        <div class="badge-stack">
          <div class="badge-row">
            <span class="status-dot" id="status-dot" title="Server: connected"></span>
            <button class="model-badge" id="model-badge" title="Click to cycle: Auto / Fast / Full">
              <span class="model-mode" id="model-mode">AUTO</span>
              <span class="model-name" id="model-name">sonnet-4-6</span>
            </button>
          </div>
          <div class="badge-row">
            <span class="status-dot kb-dot offline" id="kb-dot" title="Knowledge Vault: checking..."></span>
            <span class="kb-badge offline" id="kb-badge" title="Knowledge Vault: checking...">
              <span class="kb-label">Knowledge Vault</span>
            </span>
          </div>
        </div>
        <div class="header-actions">
          <button class="icon-btn" id="new-session-btn" title="New session">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M12 5v14M5 12h14"/>
            </svg>
          </button>
          <button class="icon-btn" id="generate-brief-btn" title="Generate Brief">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/>
              <polyline points="13 2 13 9 20 9"/>
            </svg>
          </button>
          <button class="icon-btn" id="history-btn" title="History">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="10"/>
              <path d="M12 6v6l4 2"/>
            </svg>
          </button>
          <button class="icon-btn" id="alerts-settings-btn" title="Settings">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>
    </header>
    <div id="glance-bar" class="glance-bar" aria-label="Day at a glance">
      <div class="glance-collapsed" id="glance-collapsed"></div>
      <div class="glance-expanded" id="glance-expanded"></div>
    </div>

    <main id="messages" role="log" aria-live="polite" aria-label="Terminal">
      <div class="scroll-anchor" id="scroll-anchor"></div>
    </main>

    <div id="status-bar" class="hidden">
      <span id="status-text">[PROCESSING...]</span>
      <div class="spinner"></div>
    </div>

    <footer id="input-area">
      <div class="input-row">
        <span class="prompt-prefix">></span>
        <textarea
          id="input"
          placeholder="enter command..."
          rows="1"
          enterkeyhint="send"
          autocomplete="off"
          autocorrect="off"
          spellcheck="false"
          aria-label="Command"
        ></textarea>
        <input type="file" id="image-upload" accept="image/*" multiple hidden />
        <button id="upload-btn" aria-label="Attach image" title="Attach image">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="18" height="18" rx="2"/>
            <circle cx="8.5" cy="8.5" r="1.5"/>
            <path d="M21 15l-5-5L5 21"/>
          </svg>
        </button>
        <button id="send-btn" aria-label="Send">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M5 12h14M12 5l7 7-7 7"/>
          </svg>
        </button>
      </div>
      <button id="mic-btn" aria-label="Voice input" title="Voice input">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="9" y="2" width="6" height="12" rx="3"/>
          <path d="M5 10a7 7 0 0 0 14 0"/>
          <line x1="12" y1="17" x2="12" y2="22"/>
          <line x1="8" y1="22" x2="16" y2="22"/>
        </svg>
      </button>
    </footer>
  </div>

  <div id="history-panel" class="panel hidden">
    <div class="panel-header">
      <span class="panel-title">[HISTORY]</span>
      <button class="icon-btn" id="history-close-btn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M18 6L6 18M6 6l12 12"/>
        </svg>
      </button>
    </div>
    <div class="panel-body" id="history-list"></div>
  </div>

  <div id="confirm-modal" class="modal hidden">
    <div class="modal-box">
      <p class="modal-text">Start new session?<br><span class="modal-sub">Current conversation will be saved.</span></p>
      <div class="modal-actions">
        <button class="modal-btn confirm" id="modal-confirm">[CONFIRM]</button>
        <button class="modal-btn cancel" id="modal-cancel">[CANCEL]</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
